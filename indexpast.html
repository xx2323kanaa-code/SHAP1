<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Greifer SHAP Sphere Task v3</title>
<style>
  body { margin:0; overflow:hidden; font-family:system-ui, sans-serif; background:#eef8ee; }
  #info { position:fixed; top:12px; left:50%; transform:translateX(-50%); background:#ffffffdd; padding:8px 14px; border-radius:12px; font-size:14px; text-align:center; max-width:92vw; z-index:5; }
  #hud { position:fixed; top:12px; left:12px; background:#ffffffdd; border-radius:12px; padding:10px 12px; font-size:15px; line-height:1.5; z-index:5; min-width:160px; }
  #modeBox { position:fixed; top:112px; left:12px; background:#ffffffdd; border-radius:12px; padding:8px 10px; z-index:5; font-size:13px; }
  #modeBox button { margin:3px; padding:6px 9px; border-radius:8px; border:1px solid #777; background:#f7f7f7; }
  #modeBox button.on { background:#dff3ff; border-color:#178ad6; font-weight:700; }
  #btn { position:fixed; bottom:26px; left:50%; transform:translateX(-50%); width:120px; height:72px; border-radius:18px; border:2px solid #333; background:#f5f5f5; font-size:28px; font-weight:700; z-index:5; }
  #btn:active { background:#eaffea; }
  #panel { position:fixed; top:68px; right:14px; width:340px; max-height:82vh; overflow:auto; background:#ffffffee; border:1px solid #bbb; border-radius:12px; padding:12px; font-size:13px; box-shadow:0 6px 18px #0002; z-index:5; }
  #panel h3 { margin:0 0 8px; font-size:15px; }
  #panel h4 { margin:12px 0 4px; font-size:13px; border-top:1px solid #ddd; padding-top:8px; }
  #panel label { display:grid; grid-template-columns:74px 1fr 58px; gap:8px; align-items:center; margin:7px 0; }
  #panel input[type=range] { width:100%; }
  .rangeWrap { position:relative; display:block; width:100%; }
  .initialDot { position:absolute; top:50%; width:8px; height:8px; border-radius:50%; background:#e60000; transform:translate(-50%,-50%); pointer-events:none; box-shadow:0 0 0 1px #fff; }
  #panel button { margin:4px 3px 0 0; padding:6px 8px; border-radius:8px; border:1px solid #777; background:#f7f7f7; }
  #panelToggle { width:100%; margin:0 0 8px 0 !important; font-weight:700; }
  #panel.collapsed { width:210px; max-height:none; overflow:hidden; }
  #panel.collapsed #panelBody { display:none; }
  #coords { font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; background:#f3f3f3; border-radius:8px; padding:6px; margin-top:8px; word-break:break-all; white-space:pre-wrap; font-size:11px; }
  #end { position:fixed; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; background:#ffffffaa; z-index:10; font-weight:800; text-align:center; }
  #end .big { font-size:86px; line-height:1; }
  #end .mid { font-size:42px; margin-top:8px; }
  #end button { margin-top:18px; font-size:20px; padding:10px 18px; border-radius:12px; border:2px solid #333; background:white; }
  #warn { position:fixed; left:12px; bottom:12px; background:#fff3cd; border:1px solid #ffcc66; padding:8px 10px; border-radius:8px; font-size:12px; max-width:420px; display:none; z-index:5; }
</style>
<script async src="https://cdn.jsdelivr.net/npm/es-module-shims@1.10.0/dist/es-module-shims.min.js"></script>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
</head>
<body>
<div id="info">SHAP Sphere Task v3：Lで球を把持 → 持ち上げて壁を越える → Lで前方の窪みに置く → 自動でタイマーへ → Lでタイマーを押してEND</div>
<div id="hud">TIME: <span id="time">0.0</span><br>PHASE: <span id="phase">READY</span><br>MODE: <span id="modeName">軽量</span></div>
<div id="modeBox">
  <div style="font-weight:700; margin-bottom:4px;">球モード</div>
  <button id="modeLight" type="button" class="on">軽量</button>
  <button id="modeHeavy" type="button">重量</button>
</div>
<button id="btn">L<br><span style="font-size:13px">GRIP</span></button>
<div id="warn"></div>
<div id="end"><div class="big" id="finalTime">0.0s</div><div class="mid">END</div><button id="restartBtn">もう一度</button></div>
<div id="panel" class="collapsed">
  <h3>SHAP調整パネル</h3>
  <button id="panelToggle" type="button">調整パネルを開く</button>
  <div id="panelBody">
    <h4>球・把持</h4>
    <label>半径 <input id="sphereR" type="range" min="0.04" max="0.16" step="0.005"><span id="sphereRv"></span></label>
    <label>G-X <input id="gx" type="range" min="-0.80" max="0.80" step="0.01"><span id="gxv"></span></label>
    <label>G-Y <input id="gy" type="range" min="-0.80" max="0.80" step="0.01"><span id="gyv"></span></label>
    <label>G-Z <input id="gz" type="range" min="-0.80" max="0.80" step="0.01"><span id="gzv"></span></label>
    <label>球相対X <input id="sgx" type="range" min="-0.30" max="0.30" step="0.005"><span id="sgxv"></span></label>
    <label>球相対Z <input id="sgz" type="range" min="-0.30" max="0.30" step="0.005"><span id="sgzv"></span></label>
    <label>球X補正 <input id="sphereX" type="range" min="-0.25" max="0.25" step="0.005"><span id="sphereXv"></span></label>
    <label>球Y補正 <input id="sphereY" type="range" min="-0.10" max="0.20" step="0.005"><span id="sphereYv"></span></label>
    <label>球Z補正 <input id="sphereZ" type="range" min="-0.25" max="0.25" step="0.005"><span id="sphereZv"></span></label>
    <label>壁高さ <input id="wallH" type="range" min="0.04" max="0.24" step="0.005"><span id="wallHv"></span></label>

    <h4>グライファー角度</h4>
    <label>回転X <input id="rx" type="range" min="-1.00" max="1.00" step="0.01"><span id="rxv"></span></label>
    <label>回転Y <input id="ry" type="range" min="-1.00" max="1.00" step="0.01"><span id="ryv"></span></label>
    <label>回転Z <input id="rz" type="range" min="-1.00" max="1.00" step="0.01"><span id="rzv"></span></label>

    <h4>Jaw角度</h4>
    <label>開 <input id="openA" type="range" min="-0.20" max="1.00" step="0.01"><span id="openAv"></span></label>
    <label>閉 <input id="closedA" type="range" min="-0.30" max="0.80" step="0.01"><span id="closedAv"></span></label>

    <h4>場所</h4>
    <label>後方X <input id="rearX" type="range" min="-1.20" max="1.20" step="0.01"><span id="rearXv"></span></label>
    <label>後方Z <input id="rearZ" type="range" min="-1.20" max="1.20" step="0.01"><span id="rearZv"></span></label>
    <label>前方X <input id="frontX" type="range" min="-1.20" max="1.20" step="0.01"><span id="frontXv"></span></label>
    <label>前方Z <input id="frontZ" type="range" min="-1.20" max="1.20" step="0.01"><span id="frontZv"></span></label>
    <label>タイマX <input id="timerX" type="range" min="-1.20" max="1.20" step="0.01"><span id="timerXv"></span></label>
    <label>タイマZ <input id="timerZ" type="range" min="-1.20" max="1.20" step="0.01"><span id="timerZv"></span></label>

    <button id="saveAll" type="button">保存</button>
    <button id="resetAll" type="button">初期値</button>
    <button id="copyAll" type="button">設定コピー</button>
    <div id="coords"></div>
  </div>
</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const STORAGE_KEY = 'greifer_shap_sphere_v4_config';
const FLOOR_Y = -0.35;
const DEFAULT_CONFIG = {
  sphereRadius: 0.11,
  graspLocal: [0.24, 0.40, -0.25],
  sphereGripOffset: [0.065, -0.065],
  spherePosOffset: [0.00, 0.095, 0.020],
  wallHeight: 0.24,
  gripperRot: [0.10, 0.00, -0.15],
  openAngle: 0.66,
  closedAngle: 0.24,
  rearSlot: [-0.44, -0.41],
  frontCup: [-0.44, 0.11],
  timerButton: [0.15, 0.08]
};
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function loadConfig(){ try { const s=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null'); return s ? {...clone(DEFAULT_CONFIG), ...s} : clone(DEFAULT_CONFIG); } catch { return clone(DEFAULT_CONFIG); } }
let config = loadConfig();
let mode = 'light';

const scene = new THREE.Scene(); scene.background = new THREE.Color(0xeef8ee);
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.01, 100); camera.position.set(0,1.15,3.0);
const renderer = new THREE.WebGLRenderer({antialias:true}); renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(devicePixelRatio); document.body.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement); controls.target.set(0,0.18,0); controls.enableDamping=true;
scene.add(new THREE.AmbientLight(0xffffff,1.8)); const light=new THREE.DirectionalLight(0xffffff,2.5); light.position.set(3,5,4); scene.add(light);
const ground=new THREE.Mesh(new THREE.PlaneGeometry(7,5),new THREE.MeshStandardMaterial({color:0xf2f2f2})); ground.rotation.x=-Math.PI/2; ground.position.y=FLOOR_Y; scene.add(ground);

const root = new THREE.Group(); root.rotation.x = -Math.PI/2; scene.add(root);
const jawPivot = new THREE.Group(); root.add(jawPivot);
const loader = new GLTFLoader();
let body=null, jaw=null, normalized=false;
let state='ready', moving=false, angle=config.openAngle, targetAngle=config.openAngle;
let sphere=null, board=null, rearSlotObj=null, frontCupObj=null, wallObj=null, timerBase=null, timerButtonMesh=null;
let startTime=0, timerRunning=false, finalSeconds=0;

function setWarn(msg){ const w=document.getElementById('warn'); w.textContent=msg; w.style.display='block'; }
function setPhase(p){ document.getElementById('phase').textContent = p; }
function setMode(newMode){ mode=newMode; document.getElementById('modeLight').classList.toggle('on', mode==='light'); document.getElementById('modeHeavy').classList.toggle('on', mode==='heavy'); document.getElementById('modeName').textContent = mode==='light' ? '軽量' : '重量'; makeSphere(); resetTask(); }
document.getElementById('modeLight').onclick=()=>setMode('light'); document.getElementById('modeHeavy').onclick=()=>setMode('heavy');

function makeBoard(){
  if(board) scene.remove(board);
  board = new THREE.Group(); scene.add(board);
  const matBlue = new THREE.MeshStandardMaterial({color:0x1f86d1, roughness:.45});
  const matDark = new THREE.MeshStandardMaterial({color:0x333333, roughness:.5});
  const base = new THREE.Mesh(new THREE.BoxGeometry(1.45,0.06,0.78), matBlue); base.position.set(0,FLOOR_Y+0.03,-0.15); board.add(base);
  const railBack = new THREE.Mesh(new THREE.BoxGeometry(0.42,0.06,0.12), matDark); railBack.position.set(config.rearSlot[0], FLOOR_Y+0.09, config.rearSlot[1]); board.add(railBack);
  const slot = new THREE.Mesh(new THREE.TorusGeometry(config.sphereRadius*1.08,0.012,16,48), matDark); slot.rotation.x=Math.PI/2; slot.position.set(config.rearSlot[0], FLOOR_Y+0.095, config.rearSlot[1]); board.add(slot); rearSlotObj=slot;
  const cup = new THREE.Mesh(new THREE.TorusGeometry(config.sphereRadius*1.12,0.014,16,48), new THREE.MeshStandardMaterial({color:0x0b3f91, roughness:.4})); cup.rotation.x=Math.PI/2; cup.position.set(config.frontCup[0], FLOOR_Y+0.095, config.frontCup[1]); board.add(cup); frontCupObj=cup;
  const dish = new THREE.Mesh(new THREE.CylinderGeometry(config.sphereRadius*1.24, config.sphereRadius*1.24, 0.018, 48), new THREE.MeshStandardMaterial({color:0x5fb8e8, roughness:.4, transparent:true, opacity:.65})); dish.position.set(config.frontCup[0], FLOOR_Y+0.076, config.frontCup[1]); board.add(dish);
  const wallZ = (config.rearSlot[1] + config.frontCup[1]) / 2;
  wallObj = new THREE.Mesh(new THREE.BoxGeometry(0.56, config.wallHeight, 0.035), new THREE.MeshStandardMaterial({color:0x6b6b6b, roughness:.55}));
  wallObj.position.set(config.rearSlot[0], FLOOR_Y + config.wallHeight/2, wallZ);
  board.add(wallObj);
  timerBase = new THREE.Mesh(new THREE.BoxGeometry(0.26,0.045,0.18), new THREE.MeshStandardMaterial({color:0x555555, roughness:.35})); timerBase.position.set(config.timerButton[0], FLOOR_Y+0.052, config.timerButton[1]); board.add(timerBase);
  timerButtonMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.055,0.025,32), new THREE.MeshStandardMaterial({color:0xff3333, roughness:.3})); timerButtonMesh.position.set(config.timerButton[0], FLOOR_Y+0.095, config.timerButton[1]); board.add(timerButtonMesh);
}

function makeSphere(){
  if(sphere){ if(sphere.parent) sphere.parent.remove(sphere); sphere=null; }
  const color = mode==='light' ? 0xf4f0dd : 0xb8b8b8;
  sphere = new THREE.Mesh(new THREE.SphereGeometry(config.sphereRadius,48,32), new THREE.MeshStandardMaterial({color, roughness:.35, metalness: mode==='heavy' ? .25 : 0}));
  scene.add(sphere);
}

async function loadGreifer(){
  try{
    const b = await loader.loadAsync('Body.glb'); body=b.scene; root.add(body);
    const j = await loader.loadAsync('LeftJaw.glb'); jaw=j.scene; jawPivot.add(jaw);
    root.traverse(o=>{ if(o.isMesh){ o.material=new THREE.MeshStandardMaterial({color:0x101010,roughness:.35,metalness:.4}); }});
    normalizeWholeGreifer();
    makeBoard(); makeSphere(); resetTask();
  } catch(e){ console.error(e); setWarn('Body.glb と LeftJaw.glb を、このHTMLと同じフォルダに置いてください。'); }
}
function normalizeWholeGreifer(){ if(normalized) return; root.position.set(0,0,0); root.scale.set(1,1,1); const box=new THREE.Box3().setFromObject(root); const size=box.getSize(new THREE.Vector3()); const max=Math.max(size.x,size.y,size.z); if(max>0){ root.scale.setScalar(0.75/max); normalized=true; }}
function applyGripperRot(){ root.rotation.set(-Math.PI/2 + config.gripperRot[0], config.gripperRot[1], config.gripperRot[2]); }
function getGraspWorld(){ const p=new THREE.Vector3(...config.graspLocal); root.localToWorld(p); return p; }
function moveRootToPutGraspAt(worldPos){ const current=getGraspWorld(); root.position.add(worldPos.clone().sub(current)); }
function rootTargetForGraspAt(worldPos){ const current=getGraspWorld(); return root.position.clone().add(worldPos.clone().sub(current)); }
function sphereOffsetWorld(){ return new THREE.Vector3(config.spherePosOffset[0], config.spherePosOffset[1], config.spherePosOffset[2]); }
function sphereStartCenter(){ return new THREE.Vector3(config.rearSlot[0], FLOOR_Y + config.sphereRadius, config.rearSlot[1]).add(sphereOffsetWorld()); }
function sphereFrontCenter(){ return new THREE.Vector3(config.frontCup[0], FLOOR_Y + config.sphereRadius, config.frontCup[1]).add(sphereOffsetWorld()); }
function sphereLiftCenter(){ const c=sphereStartCenter(); const safeY = FLOOR_Y + config.sphereRadius + config.wallHeight + config.sphereRadius*0.65; return new THREE.Vector3(c.x, Math.max(c.y, safeY), c.z); }
function sphereAboveFrontCenter(){ const f=sphereFrontCenter(); const safeY = FLOOR_Y + config.sphereRadius + config.wallHeight + config.sphereRadius*0.65; return new THREE.Vector3(f.x, Math.max(f.y, safeY), f.z); }
function sphereGripOffsetWorld(){ return new THREE.Vector3(config.sphereGripOffset[0], 0, config.sphereGripOffset[1]); }
function sphereGraspTarget(center){ return center.clone().add(sphereGripOffsetWorld()); }
function timerPressPoint(){ return new THREE.Vector3(config.timerButton[0], FLOOR_Y + 0.13, config.timerButton[1]); }
function resetTask(){
  state='ready'; moving=false; timerRunning=false; startTime=0; finalSeconds=0; setPhase('READY'); document.getElementById('end').style.display='none'; document.getElementById('time').textContent='0.0';
  makeBoard(); makeSphere();
  applyGripperRot(); jawPivot.rotation.z=config.openAngle; angle=config.openAngle; targetAngle=config.openAngle;
  sphere.position.copy(sphereStartCenter());
  root.position.set(-0.55,0.25,0.05);
  moveRootToPutGraspAt(sphereGraspTarget(sphere.position));
}
function setJaw(a){ targetAngle=a; }
function updateJaw(){ angle += (targetAngle-angle)*0.08; jawPivot.rotation.z=angle; }
function moveRootSlowly(to, ms, done=null){ moving=true; const from=root.position.clone(); const start=performance.now(); function step(){ const t=Math.min(1,(performance.now()-start)/ms); const u=t*t*(3-2*t); root.position.lerpVectors(from,to,u); if(t<1) requestAnimationFrame(step); else { moving=false; done?.(); }} step(); }
function attachSphere(){
  // root.attach() preserves the sphere's world position.
  // The gripper grasp point is allowed to be slightly offset from the sphere center.
  // This lets the user tune the gripper-vs-sphere XY/Z relationship without changing the gripper angle.
  root.attach(sphere);
}
function releaseSphereAtFront(){ scene.attach(sphere); sphere.position.copy(sphereFrontCenter()); }
function onL(){
  if(moving) return;
  if(state==='ready'){
    if(!timerRunning){ timerRunning=true; startTime=performance.now(); }
    setJaw(config.closedAngle); state='gripping'; setPhase('GRIP');
    setTimeout(()=>{
      attachSphere();
      state='lifting'; setPhase('LIFT');
      const liftTarget=rootTargetForGraspAt(sphereGraspTarget(sphereLiftCenter()));
      moveRootSlowly(liftTarget, 900, ()=>{
        state='crossing'; setPhase('CROSS WALL');
        const aboveTarget=rootTargetForGraspAt(sphereGraspTarget(sphereAboveFrontCenter()));
        moveRootSlowly(aboveTarget, 2100, ()=>{ state='at_front'; setPhase('PLACE'); });
      });
    }, 550);
  } else if(state==='at_front'){
    releaseSphereAtFront(); setJaw(config.openAngle); state='released'; setPhase('TO TIMER');
    setTimeout(()=>{ const target=rootTargetForGraspAt(timerPressPoint()); moveRootSlowly(target, 1700, ()=>{ state='at_timer'; setPhase('PRESS TIMER'); }); }, 300);
  } else if(state==='at_timer'){
    timerRunning=false; finalSeconds=(performance.now()-startTime)/1000; document.getElementById('finalTime').textContent=finalSeconds.toFixed(1)+'s'; document.getElementById('end').style.display='flex'; state='end'; setPhase('END');
    if(timerButtonMesh) timerButtonMesh.position.y -= 0.015;
  } else if(state==='end') { resetTask(); }
}
addEventListener('keydown',e=>{ if(e.key==='l'||e.key==='L') onL(); }); document.getElementById('btn').onclick=onL; document.getElementById('restartBtn').onclick=resetTask;

const ids=['sphereR','gx','gy','gz','sgx','sgz','sphereX','sphereY','sphereZ','wallH','rx','ry','rz','openA','closedA','rearX','rearZ','frontX','frontZ','timerX','timerZ'];
const map={sphereR:['sphereRadius'], gx:['graspLocal',0], gy:['graspLocal',1], gz:['graspLocal',2], sgx:['sphereGripOffset',0], sgz:['sphereGripOffset',1], sphereX:['spherePosOffset',0], sphereY:['spherePosOffset',1], sphereZ:['spherePosOffset',2], wallH:['wallHeight'], rx:['gripperRot',0], ry:['gripperRot',1], rz:['gripperRot',2], openA:['openAngle'], closedA:['closedAngle'], rearX:['rearSlot',0], rearZ:['rearSlot',1], frontX:['frontCup',0], frontZ:['frontCup',1], timerX:['timerButton',0], timerZ:['timerButton',1]};

function wrapRangeInputs(){
  ids.forEach(id=>{
    const el=document.getElementById(id);
    if(!el || el.parentElement.classList.contains('rangeWrap')) return;
    const wrap=document.createElement('span');
    wrap.className='rangeWrap';
    el.parentNode.insertBefore(wrap, el);
    wrap.appendChild(el);
    const dot=document.createElement('span');
    dot.className='initialDot';
    dot.id=id+'InitDot';
    wrap.appendChild(dot);
  });
}
function initialValueFor(id){
  const path=map[id];
  return path.length===1 ? DEFAULT_CONFIG[path[0]] : DEFAULT_CONFIG[path[0]][path[1]];
}
function updateInitialMarkers(){
  ids.forEach(id=>{
    const el=document.getElementById(id);
    const dot=document.getElementById(id+'InitDot');
    if(!el || !dot) return;
    const min=parseFloat(el.min), max=parseFloat(el.max), val=initialValueFor(id);
    const pct=(val-min)/(max-min)*100;
    dot.style.left=Math.max(0,Math.min(100,pct))+'%';
  });
}
wrapRangeInputs();
updateInitialMarkers();

function getVal(path){ return path.length===1 ? config[path[0]] : config[path[0]][path[1]]; }
function setVal(path,v){ if(path.length===1) config[path[0]]=v; else config[path[0]][path[1]]=v; }
function syncInputs(){ ids.forEach(id=>{ const el=document.getElementById(id); const val=getVal(map[id]); el.value=val; document.getElementById(id+'v').textContent=Number(val).toFixed(3); }); document.getElementById('coords').textContent='const CONFIG = '+JSON.stringify(config,null,2)+';'; }
ids.forEach(id=>{ document.getElementById(id).addEventListener('input', e=>{ setVal(map[id], parseFloat(e.target.value)); syncInputs(); resetTask(); }); });
document.getElementById('saveAll').onclick=()=>{ localStorage.setItem(STORAGE_KEY, JSON.stringify(config)); alert('保存しました'); };
document.getElementById('resetAll').onclick=()=>{ config=clone(DEFAULT_CONFIG); localStorage.removeItem(STORAGE_KEY); syncInputs(); resetTask(); };
document.getElementById('copyAll').onclick=async()=>{ await navigator.clipboard.writeText('const CONFIG = '+JSON.stringify(config,null,2)+';'); alert('コピーしました'); };
document.getElementById('panelToggle').onclick=()=>{ const p=document.getElementById('panel'); p.classList.toggle('collapsed'); document.getElementById('panelToggle').textContent=p.classList.contains('collapsed')?'調整パネルを開く':'調整パネルを閉じる'; };
syncInputs();

function animate(){ requestAnimationFrame(animate); controls.update(); updateJaw(); if(timerRunning) document.getElementById('time').textContent=((performance.now()-startTime)/1000).toFixed(1); renderer.render(scene,camera); } animate();
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
loadGreifer();
</script>
</body>
</html>
